<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Colégio Ilha Brasil</title>
    <link rel="stylesheet" href="css/style.css?v=20260114-1500">
    <link rel="stylesheet" href="css/login.css?v=20260114-1500">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-container">
                <img src="assets/images/logo.png" alt="Colégio Ilha Brasil" class="logo">
            </div>
            
            <h1>Bem-vindo!</h1>
            <p class="subtitle">Faça login para acessar o sistema</p>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <button type="submit" class="btn-login" id="btnLogin">
                    <span id="btnText">Entrar</span>
                    <span id="btnLoader" class="loader" style="display: none;"></span>
                </button>
            </form>
            
            <div class="login-footer">
                <p>Esqueceu sua senha? <a href="#" id="forgotPassword">Clique aqui</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="js/firebase-config.js?v=20260114-1500"></script>
    <script type="module" src="js/login.js?v=20260114-1500"></script>
</body>
</html>
